    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ora — Automatisation Excel sur mesure</title>
    <meta name="description" content="Ora crée des automatisations Python sur mesure pour vos rapports, réconciliations et factures Excel — automatiquement." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function () {
      var stored = localStorage.getItem('ora-theme-v2');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
      document.documentElement.classList.add(theme);
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
